# CI Pipe Line

steps:
  - name: Checkout code
    uses: actions/checkout@v2
  - name: Set up Python
    uses: actions/setup-python@v2
    with:
      python-version: '3.8'
  - name: Install dependencies
    run: |
      pip install -r requirements.txt
  - name: Run tests
    run: |
      pytest tests/
  - name: Build application
    run: |
      python setup.py build
  - name: Deploy application
    if: success()
    run: |
      echo "Deploying application..."
  